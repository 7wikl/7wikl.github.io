		<p title="李白">将进酒</p>
		<a id="author" href="https://baike.baidu.com/item/%E6%9D%8E%E7%99%BD/1043?fr=aladdin" target="_blank">李白</a>
		<p>君不见，</p>
		<p>黄河之水天上来，</p>
		<p>奔流到海不复回。</p>
		<p>君不见，</p>
		<p>高堂明镜悲白发，</p>
		<p>朝如青丝暮成雪。</p>
		<p>人生得意须尽欢，</p>
		<p>莫使金樽空对月。</p>
		<p>天生我材必有用，千金散尽还复来。</p>
		<p>烹羊宰牛且为乐，会须一饮三百杯。</p>
		<p>岑夫子，</p>
		<p>丹丘生，</p>	
		<p>将进酒，杯莫停。</p>
