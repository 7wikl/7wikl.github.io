<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>layout</title>
		<link rel="icon" href="./image/wikl.ico" type="image/x-icon">
		
		<style>
			header,main,footer {
				width:1000px;
				margin: 0 auto;
			}
			header{
				height: 150px;
				background-color: silver;
			}
			main{
				height: 500px;
				background-color: #bfa;
				margin:10px auto;
			}
			nav,article,aside {
				float:left;
				height: 100%;
			}
			nav {
				width:200px;
				background-color: yellow;
			}
			article {
				width: 580px;
				background-color: orange;
				margin:0 10px;
			}
			aside {
				width: 200px;
				background-color: hotpink;
			}
			footer{
				height: 150px;
				background-color: tomato;

			}
		</style>
	</head>
	<body>
		
		<header></header>
		
		<main>
			<!-- 左侧导航 -->
			<nav></nav>
			<!-- 中间文章 -->
			<article></article>
			<!-- 右边边栏 -->
			<aside></aside>
		</main>
		
		<footer></footer>
		
	</body>
</html>
